<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Queue Status</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>

        .progress{
    background:#e2e8f0;
}

.progress-bar{
    background:linear-gradient(
        to right,
        #38bdf8,
        #2563eb
    );
}

        body{
            margin:0;
            padding:0;
            font-family:Arial;
            background:linear-gradient(to right, #141e30, #243b55);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            color:white;
        }

        .queue-card{
            width:500px;
            background:rgba(255,255,255,0.1);
            padding:40px;
            border-radius:25px;
            backdrop-filter:blur(12px);
            box-shadow:0px 0px 30px rgba(0,0,0,0.3);
            text-align:center;
        }

        .success-icon{
            font-size:70px;
            color:#4ade80;
            margin-bottom:20px;
        }

        .queue-card h1{
            font-size:40px;
            font-weight:bold;
            margin-bottom:10px;
        }

        .token-box{
            background:white;
            color:#0f172a;
            padding:25px;
            border-radius:20px;
            margin:30px 0;
        }

        .token-box h2{
            font-size:50px;
            font-weight:bold;
            color:#2563eb;
        }

        .info-box{
            display:flex;
            justify-content:space-between;
            margin-top:25px;
        }

        .info-card{
            width:48%;
            background:rgba(255,255,255,0.15);
            padding:20px;
            border-radius:15px;
        }

        .info-card h3{
            font-size:35px;
            font-weight:bold;
            margin-top:10px;
        }

        .btn-custom{
            margin-top:30px;
            padding:14px 30px;
            border-radius:12px;
            font-size:18px;
            text-decoration:none;
        }

    </style>

</head>

<body>

    <div class="queue-card">

        <i class="bi bi-check-circle-fill success-icon"></i>

        <h1>Queue Joined Successfully</h1>

        <p>
            Your digital token has been generated successfully.
        </p>

        <!-- Token Box -->

        <div class="token-box">

            <h5>Your Token Number</h5>

            <h2>{{ token_number }}</h2>

        </div>

        <!-- QR Code -->

        <div style="margin-top:30px;">

           <h5>Your QR Code</h5>

                <img src="{{ qr_code }}"
                width="180"
                height="180"
                style="border-radius:15px; background:white; padding:10px;">

        </div>

        <div class="mt-4">

    <h5>Queue Progress</h5>

    <div class="progress" style="height:25px; border-radius:20px;">

        <div class="progress-bar progress-bar-striped progress-bar-animated"
             role="progressbar"
             style="width:80%;">

            80%
        </div>

    </div>

</div>

        <!-- Queue Information -->

        <div class="info-box">

            <div class="info-card">

                <i class="bi bi-people-fill"></i>

                <p>People Ahead</p>

                <h3>{{ people_ahead }}</h3>

            </div>

            <div class="info-card">

                <i class="bi bi-clock-fill"></i>

                <p>Estimated Time</p>

                <h3>{{ estimated_time }} mins</h3>

            </div>

        </div>

        <!-- Buttons -->

        <a href="/dashboard/"
           class="btn btn-light btn-custom">

            Back to Dashboard

        </a>

    </div>

</body>
</html>
