<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>My Queue</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background:#0f172a;
            color:white;
            font-family:Arial;
            padding:40px;
        }

        .table-box{
            background:white;
            color:black;
            padding:30px;
            border-radius:20px;
        }

        h1{
            margin-bottom:30px;
            font-weight:bold;
        }

        .badge-waiting{
            background:orange;
            padding:8px 15px;
            border-radius:10px;
            color:white;
        }

        .badge-completed{
            background:green;
            padding:8px 15px;
            border-radius:10px;
            color:white;
        }

    </style>

</head>

<body>

    <h1>My Queue History</h1>

    <div class="table-box">

        <table class="table">

            <thead>

                <tr>

                    <th>Token</th>

                    <th>Status</th>

                    <th>Created Time</th>

                </tr>

            </thead>

            <tbody>

                {% for token in tokens %}

                <tr>

                    <td>{{ token.token_number }}</td>

                    <td>

                        {% if token.status == 'Waiting' %}

                            <span class="badge-waiting">

                                Waiting

                            </span>

                        {% else %}

                            <span class="badge-completed">

                                Completed

                            </span>

                        {% endif %}

                    </td>

                    <td>{{ token.created_at }}</td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

</body>

</html>
