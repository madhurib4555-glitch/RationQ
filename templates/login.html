<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>User Login</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            margin:0;
            padding:0;
            font-family:Arial, sans-serif;
            background:#0f172a;
            height:100vh;
            overflow:hidden;
        }

        .main-container{
            display:flex;
            height:100vh;
        }

        .left-section{
            width:50%;
            background:linear-gradient(to bottom right, #2563eb, #1e3a8a);
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;
            padding:50px;
        }

        .left-section h1{
            font-size:60px;
            font-weight:bold;
        }

        .left-section p{
            font-size:20px;
            margin-top:20px;
            text-align:center;
            width:80%;
        }

        .right-section{
            width:50%;
            display:flex;
            justify-content:center;
            align-items:center;
            background:white;
        }

        .login-box{
            width:400px;
        }

        .login-box h2{
            font-size:40px;
            margin-bottom:30px;
            font-weight:bold;
            color:#1e293b;
        }

        .form-control{
            padding:14px;
            margin-bottom:20px;
            border-radius:12px;
        }

        .btn-login{
            width:100%;
            padding:14px;
            border:none;
            border-radius:12px;
            background:#2563eb;
            color:white;
            font-size:18px;
            transition:0.3s;
        }

        .btn-login:hover{
            background:#1d4ed8;
        }

        .register-link{
            margin-top:20px;
            text-align:center;
        }

        .register-link a{
            text-decoration:none;
            color:#2563eb;
            font-weight:bold;
        }

    </style>

</head>

<body>

    <div class="main-container">

        <!-- Left Side -->

        <div class="left-section">

            <h1>RationQ</h1>

            <p>
                Smart digital queue management system for reducing waiting time
                in ration shops and improving customer experience.
            </p>

        </div>

        <!-- Right Side -->

        <div class="right-section">

            <div class="login-box">

                <h2>Login</h2>

                <form method="POST">

                    {% csrf_token %}

                    <input type="text"
                           name="username"
                           class="form-control"
                           placeholder="Enter Username"
                           required>

                    <input type="password"
                           name="password"
                           class="form-control"
                           placeholder="Enter Password"
                           required>

                    <button type="submit" class="btn-login">

                        Login

                    </button>

                </form>

                <div class="register-link">

                    Don't have an account?

                    <a href="/register/">

                        Register

                    </a>

                </div>

            </div>

        </div>

    </div>

</body>
</html>
