<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background: linear-gradient(to right, #141e30, #243b55);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:Arial;
        }

        .register-box{
            background: rgba(255,255,255,0.1);
            padding:40px;
            width:400px;
            border-radius:20px;
            backdrop-filter: blur(10px);
            box-shadow:0px 0px 20px rgba(0,0,0,0.3);
            color:white;
        }

        .register-box h1{
            text-align:center;
            margin-bottom:30px;
            font-weight:bold;
        }

        .form-control{
            margin-bottom:20px;
            padding:12px;
            border-radius:10px;
        }

        .btn-custom{
            width:100%;
            padding:12px;
            border-radius:10px;
            font-size:18px;
        }

        .login-link{
            text-align:center;
            margin-top:20px;
        }

        .login-link a{
            color:#00bfff;
            text-decoration:none;
        }

        .error{
            color:#ff6b6b;
            text-align:center;
            margin-bottom:15px;
        }

    </style>

</head>

<body>

    <div class="register-box">

        <h1>Create Account</h1>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

        <form method="POST">

            {% csrf_token %}

            <input type="text"
                   name="username"
                   class="form-control"
                   placeholder="Enter Username"
                   required>

            <input type="email"
                   name="email"
                   class="form-control"
                   placeholder="Enter Email"
                   required>

            <input type="password"
                   name="password"
                   class="form-control"
                   placeholder="Enter Password"
                   required>

            <button type="submit"
                    class="btn btn-primary btn-custom">

                Register

            </button>

        </form>

        <div class="login-link">

            Already have an account?

            <a href="/login/">Login</a>

        </div>

    </div>

</body>
</html>
