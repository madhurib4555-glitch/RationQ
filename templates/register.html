<!DOCTYPE html>

<html lang="en">

<head>


<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register | RationQ</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

<style>

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:'Poppins',sans-serif;
    }

    body{
        min-height:100vh;
        background:linear-gradient(
            180deg,
            #f8fafc,
            #eff6ff
        );
    }

    .main-container{
        min-height:100vh;
        display:flex;
        align-items:center;
        justify-content:center;
        padding:40px;
    }

    .register-card{

        width:100%;
        max-width:500px;

        background:white;

        padding:45px;

        border-radius:28px;

        border:1px solid #e2e8f0;

        box-shadow:
        0 20px 40px rgba(0,0,0,0.06);
    }

    .logo{
        text-align:center;
        font-size:38px;
        font-weight:800;
        color:#2563eb;
        margin-bottom:10px;
    }

    .register-card h2{
        text-align:center;
        font-size:34px;
        font-weight:700;
        color:#0f172a;
        margin-bottom:10px;
    }

    .subtitle{
        text-align:center;
        color:#64748b;
        margin-bottom:30px;
    }

    .form-control{

        padding:15px;

        border-radius:14px;

        border:1px solid #cbd5e1;

        margin-bottom:18px;
    }

    .form-control:focus{

        border-color:#2563eb;

        box-shadow:
        0 0 0 4px rgba(37,99,235,.12);
    }

    .btn-register{

        width:100%;

        padding:15px;

        border:none;

        border-radius:14px;

        background:#2563eb;

        color:white;

        font-size:18px;

        font-weight:600;

        box-shadow:
        0 10px 25px rgba(37,99,235,.25);
    }

    .btn-register:hover{
        background:#1d4ed8;
    }

    .error{
        color:#dc2626;
        text-align:center;
        margin-bottom:15px;
    }

    .login-link{
        text-align:center;
        margin-top:25px;
        color:#64748b;
    }

    .login-link a{
        color:#2563eb;
        text-decoration:none;
        font-weight:600;
    }

    .login-link a:hover{
        text-decoration:underline;
    }

</style>


</head>

<body>

<div class="main-container">


<div class="register-card">

    <div class="logo">
        RationQ
    </div>

    <h2>Create Account</h2>

    <p class="subtitle">
        Join the Smart Queue Management System
    </p>

    {% if error %}
        <div class="error">
            {{ error }}
        </div>
    {% endif %}

    <form method="POST">

        {% csrf_token %}

        <input
            type="text"
            name="username"
            class="form-control"
            placeholder="Enter Username"
            required>

        <input
            type="email"
            name="email"
            class="form-control"
            placeholder="Enter Email Address"
            required>

        <input
            type="password"
            name="password"
            class="form-control"
            placeholder="Create Password"
            required>

        <button
            type="submit"
            class="btn-register">

            Create Account

        </button>

    </form>

    <div class="login-link">

        Already have an account?

        <a href="/login/">
            Login
        </a>

    </div>

</div>


</div>

</body>

</html>
